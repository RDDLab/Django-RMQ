name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:

  # Unit tests across the supported Python versions
  test:
    runs-on: self-hosted

    strategy:
      matrix:
        python-version: [ "3.10", "3.11", "3.12", "3.13", "3.14" ]
      fail-fast: true

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev --python ${{ matrix.python-version }}

      - name: Run tests
        run: uv run --python ${{ matrix.python-version }} pytest

  # Integration tests against a real RabbitMQ broker (deselected in the unit job)
  integration:
    runs-on: self-hosted

    services:
      rabbitmq:
        image: rabbitmq:4.3.1-management-alpine
        ports:
          - 5672:5672
          - 15672:15672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      RMQ_HOST: localhost
      RMQ_PORT: 5672
      RMQ_MGMT_PORT: 15672
      RMQ_USER: guest
      RMQ_PASSWORD: guest
      RMQ_VHOST: /

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --group dev --python 3.12

      - name: Run integration tests
        run: uv run --python 3.12 pytest -m integration