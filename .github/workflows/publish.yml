name: Upload Django-RMQ Package

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:

  # Assemble the package (once, py3-none-any)
  release-build:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Set up Python
        run: uv python install 3.10  # The build version doesn't matter which one.

      - name: Build distributions
        run: uv build

      - name: Upload distributions as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-dists
          path: dist/

  # Publish on PyPI
  pypi-publish:
    runs-on: self-hosted
    needs: release-build

    permissions:
      id-token: write

    environment:
      name: pypi
      url: https://pypi.org/p/django-rmq

    steps:
      - name: Download distributions from artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-dists
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist/
